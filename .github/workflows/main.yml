name: Build Executables
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  pyinstaller-build-windows:
    runs-on: windows-latest
    steps:
      - name: Create Win Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.14'
          pyinstaller_ver: '==6.19.0'
          spec: 'ShareMii.py'
          requirements: 'requirements.txt'
          upload_exe_with_name: 'ShareMii-winx64'
          options: --onefile, --name "ShareMii", --add-data "icon.png:.", --add-data "logo.png:.", --windowed, --icon "icon.ico"
  pyinstaller-build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Create Linux Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.14'
          pyinstaller_ver: '==6.19.0'
          spec: 'ShareMii.py'
          requirements: 'requirements.txt'
          upload_exe_with_name: 'ShareMii-ubuntu'
          options: --onefile, --name "ShareMii", --add-data "icon.png:.", --add-data "logo.png:.", --windowed
  pyinstaller-build-macos:
    runs-on: macos-latest
    steps:
      - name: Create MacOS Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.14'
          pyinstaller_ver: '==6.19.0'
          spec: 'ShareMii.py'
          requirements: 'requirements.txt'
          upload_exe_with_name: 'ShareMii-macos'
          options: --onefile, --name "ShareMii", --add-data "icon.png:.", --add-data "logo.png:.", --windowed
