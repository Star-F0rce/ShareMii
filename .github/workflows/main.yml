name: Build Executables
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  pyinstaller-build-windows:
    runs-on: windows-latest
    steps:
      - name: Create Win Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.6'
          pyinstaller_ver: '==5.13.2'
          spec: 'src/ShareMii.py'
          requirements: 'src/requirements.txt'
          upload_exe_with_name: 'windows'
          options: --onefile, --name "ShareMii", --windowed, --icon "icon.ico"
  pyinstaller-build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Create Linux Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.6'
          pyinstaller_ver: '==5.13.2'
          spec: 'src/ShareMii.py'
          requirements: 'src/requirements.txt'
          upload_exe_with_name: 'linux'
          options: --onefile, --name "ShareMii", --windowed, --icon "icon.ico"
  pyinstaller-build-macos:
    runs-on: macos-latest
    steps:
      - name: Create MacOS Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.6'
          pyinstaller_ver: '==5.13.2'
          spec: 'src/ShareMii.py'
          requirements: 'src/requirements.txt'
          upload_exe_with_name: 'macos'
          options: --onefile, --name "ShareMii", --windowed, --icon "icon.ico"
